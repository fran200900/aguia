<script>
const fabRoot = document.getElementById("fabRoot");
const fabToggle = document.getElementById("fabToggle");
const fabOverlay = document.getElementById("fabOverlay");

let open = false;

function toggleMenu(state){
  open = state;
  fabRoot.classList.toggle("open", open);
  fabToggle.innerHTML = open ? '<i class="fas fa-times"></i>' : '<i class="fas fa-plus"></i>';
}

fabToggle.onclick = () => toggleMenu(!open);
fabOverlay.onclick = () => toggleMenu(false);

document.querySelectorAll(".fab-item[data-target]").forEach(btn=>{
  btn.onclick = () => {
    const id = btn.dataset.target;
    document.querySelectorAll(".section").forEach(s=>{
      s.classList.toggle("active", s.id === id);
    });
    toggleMenu(false);
  };
});
</script>
