  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body,html{
      font-family:'Roboto',sans-serif;
      background:#f4f6f8;
      height:100vh;
      display:flex;
      flex-direction:column;
      color:#1a1a1a;
      overflow:hidden;
    }

    header{
      background:#129e00;
      display:flex;
      align-items:center;
      padding:10px 20px;
      height:50px;
      position:fixed;
      top:0;
      width:100%;
      z-index:1000;
      color:#fff;
      font-weight:bold;
    }
    header img{height:35px;margin-right:10px}

    #main-content{
      flex:1;
      margin-top:50px;
      display:flex;
      flex-direction:column;
    }

    /* MENU VISÍVEL */
    .menu-bancas{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:10px;
      background:#fff;
      border-bottom:1px solid #ddd;
      position:sticky;
      top:50px;
      z-index:999;
    }
    .menu-bancas button{
      padding:10px 18px;
      border:none;
      border-radius:8px;
      background:#129e00;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
      transition:.2s;
    }
    .menu-bancas button:hover{
      background:#0e7e00;
      transform:scale(1.05);
    }

    .section{
      width:100%;
      height:calc(100vh - 100px);
      display:none;
      background:#fff;
    }
    .section.active{display:block}

    /* NOVO: barra de link acima do iframe */
    .link-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border-bottom:1px solid #e6e6e6;
      background:#ffffff;
    }
    .link-bar .left{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex:1;
    }
    .link-bar .label{
      font-weight:700;
      color:#129e00;
      white-space:nowrap;
    }
    .link-bar a{
      color:#0b66c3;
      text-decoration:underline;
      font-weight:500;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      display:block;
      max-width:100%;
    }
    .link-bar .open-btn{
      border:none;
      border-radius:8px;
      padding:10px 12px;
      background:#129e00;
      color:#fff;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }
    .link-bar .open-btn:hover{background:#0e7e00}

    /* iframe agora desconta a altura da link-bar (~52px) */
    iframe{
      width:100%;
      height:calc(100% - 52px);
      border:none;
      background:#fff;
    }

    /* MENU FLUTUANTE */
    .fab-container{position:fixed;bottom:20px;right:20px;z-index:1002}
    .fab-main{
      width:60px;height:60px;border-radius:50%;
      background:#129e00;color:#fff;font-size:28px;
      border:none;cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.3);
    }
    .fab-menu{
      position:absolute;bottom:80px;right:0;
      display:flex;flex-direction:column;gap:12px;
      opacity:0;pointer-events:none;transform:translateY(10px);
      transition:.2s;
    }
    .fab-container.open .fab-menu{
      opacity:1;pointer-events:auto;transform:translateY(0);
    }
    .fab-item{
      width:55px;height:55px;border-radius:50%;
      background:#129e00;color:#fff;
      display:flex;align-items:center;justify-content:center;
      border:none;cursor:pointer;
      box-shadow:0 3px 10px rgba(0,0,0,.25);
      text-decoration:none;
    }
  </style>
</head>

<body>

<header>
  <img src="aguia.png" alt="Águia Logo">
  ÁGUIA OFICIAL
</header>

<div id="main-content">

  <!-- MENU VISÍVEL -->
  <div class="menu-bancas">
    <button onclick="mostrar('aguia')">🦅 Águia</button>
    <button onclick="mostrar('acertos')">🎯 Acertos</button>
    <button onclick="mostrar('feiticeira')">🔮 Feiticeira</button>
  </div>

  <div id="aguia" class="section active">
    <div class="link-bar">
      <div class="left">
        <span class="label">Águia:</span>
        <a href="https://app.aguiaoficial.com/pr/ZXbjMC6Q" target="_blank" rel="noopener noreferrer">
          https://app.aguiaoficial.com/pr/ZXbjMC6Q
        </a>
      </div>
      <button class="open-btn" onclick="window.open('https://app.aguiaoficial.com/pr/ZXbjMC6Q','_blank')">
        Abrir
      </button>
    </div>
    <iframe src="https://app.aguiaoficial.com/pr/ZXbjMC6Q" loading="lazy"></iframe>
  </div>

  <div id="acertos" class="section">
    <!-- LINK VISÍVEL (NOVO) -->
    <div class="link-bar">
      <div class="left">
        <span class="label">Acertos:</span>
        <a href="https://app.acertos.club/pr/JcsF2PpU" target="_blank" rel="noopener noreferrer">
          https://app.acertos.club/pr/JcsF2PpU
        </a>
      </div>
      <button class="open-btn" onclick="window.open('https://app.acertos.club/pr/JcsF2PpU','_blank')">
        Abrir
      </button>
    </div>
    <iframe src="https://app.acertos.club/pr/JcsF2PpU" loading="lazy"></iframe>
  </div>

  <div id="feiticeira" class="section">
    <!-- LINK VISÍVEL (NOVO) -->
    <div class="link-bar">
      <div class="left">
        <span class="label">Feiticeira:</span>
        <a href="https://app.feiticeira.club/pr/2iCVbLKr" target="_blank" rel="noopener noreferrer">
          https://app.feiticeira.club/pr/2iCVbLKr
        </a>
      </div>
      <button class="open-btn" onclick="window.open('https://app.feiticeira.club/pr/2iCVbLKr','_blank')">
        Abrir
      </button>
    </div>
    <iframe src="https://app.feiticeira.club/pr/2iCVbLKr" loading="lazy"></iframe>
  </div>

</div>

<!-- MENU FLUTUANTE -->
<div class="fab-container" id="fabRoot">
  <button class="fab-main" id="fabToggle"><i class="fas fa-plus"></i></button>

  <div class="fab-menu" id="fabMenu">
    <button class="fab-item" onclick="mostrar('aguia')">🦅</button>
    <button class="fab-item" onclick="mostrar('acertos')">🎯</button>
    <button class="fab-item" onclick="mostrar('feiticeira')">🔮</button>
    <a class="fab-item" href="https://wa.me/5583994073892" target="_blank" rel="noopener noreferrer">💬</a>
  </div>
</div>

<script>
  function mostrar(id){
    document.querySelectorAll('.section').forEach(sec=>{
      sec.classList.toggle('active',sec.id===id);
    });
  }

  const fabRoot=document.getElementById('fabRoot');
  const fabToggle=document.getElementById('fabToggle');
  fabToggle.onclick=()=>fabRoot.classList.toggle('open');

  // ANTI-BOT BÁSICO
  (function(){
    let clicks=0;
    document.addEventListener('click',()=>clicks++);
    setInterval(()=>{
      if(clicks>40){
        document.body.innerHTML="<h1>Acesso bloqueado</h1>";
      }
      clicks=0;
    },5000);
  })();
</script>
