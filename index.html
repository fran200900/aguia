  <!-- Font Awesome assíncrono -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-70QZPPYYF7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-70QZPPYYF7');
  </script>

  <style>
    :root { --primary: #25D366; }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Roboto', system-ui, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #1a1a1a;
      overflow: hidden;
      height: 100dvh;
    }

    .section { height: 100dvh; position: relative; }

    /* Placeholder / Skeleton que aparece instantaneamente */
    .iframe-placeholder {
      position: absolute;
      inset: 0;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      z-index: 2;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .iframe-placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Banner Promotor (mantido fixo) -->
  <a href="https://wa.me/5583993753199?text=Ol%C3%A1%2C%20quero%20ser%20um%20promotor%2C%20como%20fa%C3%A7o%3F" 
     target="_blank" rel="noopener noreferrer"
     class="promo-banner">
    <span>🔥</span> QUER SE TORNAR PROMOTOR E FATURAR DE CASA? <span>CLIQUE AQUI E SAIBA MAIS! 🔥</span>
  </a>

  <main>
    <div id="aguia" class="section">
      <!-- Placeholder que aparece imediatamente -->
      <div id="placeholder" class="iframe-placeholder">
        <div class="spinner"></div>
        <div>Carregando Águia Oficial...</div>
      </div>

      <!-- Iframe com prioridade alta -->
      <iframe 
        id="main-iframe"
        src="https://app.aguiaoficial.com/pr/ZXbjMC6Q"
        fetchpriority="high"
        referrerpolicy="no-referrer-when-downgrade"
        allow="clipboard-read; clipboard-write; fullscreen; autoplay; encrypted-media"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-clipboard-read allow-clipboard-write"
        title="Plataforma Águia Oficial - Apostas ao vivo">
      </iframe>
    </div>
  </main>

  <!-- Botão WhatsApp -->
  <div class="fab-container">
    <a href="https://wa.me/5583993753199?text=Ol%C3%A1%20suporte%2C%20vim%20pelo%20site%20e%20preciso%20de%20ajuda" 
       target="_blank" rel="noopener noreferrer"
       class="fab-main" aria-label="Falar com suporte no WhatsApp">
      <i class="fab fa-whatsapp"></i>
      <span class="fab-label">Suporte</span>
    </a>
  </div>

  <script>
    const iframe = document.getElementById('main-iframe');
    const placeholder = document.getElementById('placeholder');

    // Quando o iframe terminar de carregar, esconde o placeholder
    iframe.addEventListener('load', () => {
      placeholder.classList.add('hidden');
      
      // Pequeno delay para transição suave
      setTimeout(() => {
        placeholder.style.display = 'none';
      }, 400);
    });

    // Fallback: se demorar mais de 8 segundos, esconde mesmo assim
    setTimeout(() => {
      if (!placeholder.classList.contains('hidden')) {
        placeholder.classList.add('hidden');
      }
    }, 8000);
  </script>

</body>
